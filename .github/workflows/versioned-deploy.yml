# Reusable deploy workflow — the single source of deploy logic for every consuming repo.
# A consumer adds a thin caller (see SETUP.md) and this does the rest: resolve the release,
# cut + push the tag, stamp the provenance certificate, run the configured deploy strategy,
# and verify. All project specifics come from the consumer's committed `versioning` config.
# rpv is installed from this PUBLIC repo (no token); deploy secrets are passed by the caller
# (explicitly or via `secrets: inherit`).
name: versioned-deploy

on:
  workflow_call:
    inputs:
      channel:      { type: string, required: true,  description: "production | staging" }
      package:      { type: string, required: false, default: "", description: "monorepo package name" }
      release:      { type: string, required: false, default: "minor", description: "minor | major" }
      rollback:     { type: string, required: false, default: "", description: "version to redeploy (e.g. 1.3.0)" }
      ref:          { type: string, required: false, default: "main" }
      node-version: { type: string, required: false, default: "20" }
    secrets:
      DEPLOY_SSH_KEY: { required: false } # server-ssh; caller may map an existing key to this name
      AWS_ROLE_ARN:   { required: false } # static-s3

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # push the vMAJOR.MINOR.0 release tag
    env:
      # Project config references these as "$NAME"; map vars/secrets to them once here.
      PRODUCTION_URL: ${{ vars.PRODUCTION_URL }}
      STAGING_URL: ${{ vars.STAGING_URL }}
      DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
      STAGING_DEPLOY_HOST: ${{ vars.STAGING_DEPLOY_HOST }}
      DEPLOY_SSH_KEY_PATH: ${{ github.workspace }}/.rpv/deploy_key
      PKG_FLAG: ${{ inputs.package != '' && format('--package={0}', inputs.package) || '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0 # full history + tags for version math

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}

      - name: Install rpv (public package; no consumer deps on the runner)
        # git+https (not the github: shorthand, which resolves to SSH and fails on a bare runner)
        run: npm install -g git+https://github.com/Runpoint-Partners/git-versioning-tool.git#v1.1.0

      - name: Resolve strategy
        id: strat
        run: echo "name=$(rpv config get deploy.strategy --channel=${{ inputs.channel }} $PKG_FLAG)" >> "$GITHUB_OUTPUT"

      - name: Configure SSH (server-ssh)
        if: steps.strat.outputs.name == 'server-ssh'
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh "$(dirname "$DEPLOY_SSH_KEY_PATH")"
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > "$DEPLOY_SSH_KEY_PATH"
          chmod 600 "$DEPLOY_SSH_KEY_PATH"
          # Resolve the PER-CHANNEL host (channels.<channel>.deploy.host overrides the base) so a
          # separate staging box is keyscanned — not the base/production host.
          host="$(rpv config get deploy.host --channel=${{ inputs.channel }} $PKG_FLAG)"
          ssh-keyscan -H "$host" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Configure AWS (static-s3)
        if: steps.strat.outputs.name == 'static-s3'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-2' }}

      - name: Resolve release
        id: rel
        run: |
          set -euo pipefail
          # Staging is continuous (deploys on every push) — it NEVER cuts a release tag; it stamps the
          # current PATCH version (rpv stamp's default) instead. Only production cuts vMAJOR.MINOR.0 tags.
          if [ "${{ inputs.channel }}" != "production" ] && [ -z "${{ inputs.rollback }}" ]; then
            echo "create=false" >> "$GITHUB_OUTPUT"
            echo "version=" >> "$GITHUB_OUTPUT"
            echo "tag=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -n "${{ inputs.rollback }}" ]; then
            rb="${{ inputs.rollback }}"
            if echo "$rb" | grep -qE '^[0-9]+\.[0-9]+(\.[0-9]+)?$'; then
              info="$(rpv rollback-target "$rb" "$rb")"            # explicit version
            else
              url="$(rpv config get channels.${{ inputs.channel }}.url $PKG_FLAG)" # spec (minor/major) relative to live
              current="$(curl -fsS "$url/version" | jq -r .version)"
              info="$(rpv rollback-target "$current" "$rb")"
            fi
            git checkout --quiet "$(echo "$info" | jq -r .tag)"        # deploy the rolled-back code
            create=false
          else
            info="$(rpv resolve-release --release=${{ inputs.release }})"
            create="$(echo "$info" | jq -r .createTag)"
          fi
          echo "create=$create" >> "$GITHUB_OUTPUT"
          echo "version=$(echo "$info" | jq -r .version)" >> "$GITHUB_OUTPUT"
          echo "tag=$(echo "$info" | jq -r .tag)" >> "$GITHUB_OUTPUT"

      - name: Cut release tag
        if: steps.rel.outputs.create == 'true'
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.rel.outputs.tag }}" -m "Release ${{ steps.rel.outputs.version }} (${{ inputs.channel }})"
          git push origin "${{ steps.rel.outputs.tag }}"

      - name: Stamp provenance
        run: |
          if [ -n "${{ steps.rel.outputs.version }}" ]; then
            rpv stamp --channel=${{ inputs.channel }} --version="${{ steps.rel.outputs.version }}" $PKG_FLAG
          else
            rpv stamp --channel=${{ inputs.channel }} $PKG_FLAG   # staging: stamp the current PATCH version
          fi

      - name: Deploy
        run: rpv deploy --channel=${{ inputs.channel }} $PKG_FLAG

      - name: Verify
        continue-on-error: true # informational; libraries / no-URL channels have nothing to hit
        run: rpv verify --${{ inputs.channel }} $PKG_FLAG
