name: Production deploy (manual)

# Manual production deploy. Pushing does NOT trigger this — staging.yml handles auto-deploys.
# Cuts the next release tag (MINOR, or MAJOR for a breaking change), stamps the version, deploys
# (rsync-over-SSH to a Node host running pm2), and verifies /version. Rollback re-deploys an
# earlier release without cutting a new version. Everything is driven by GitHub Environment config.
#
# Configure the `production` environment (Settings → Environments → production):
#   Secrets:    DEPLOY_SSH_KEY                  private key for DEPLOY_USER@DEPLOY_HOST
#   Variables:  DEPLOY_HOST                     host/IP of the production server
#               DEPLOY_USER                     SSH user (e.g. ec2-user)
#               DEPLOY_PATH                     app directory on the server
#               DEPLOY_ENTRY                    node entrypoint (e.g. src/app/server.js)
#               BASE_URL                        production URL that serves GET /version
#               DEPLOY_PM2_PROCESS  (optional)  pm2 process name        [default: app]
#               STAMP_PATH          (optional)  certificate path        [default: src/app/build-stamp.json]

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref (branch / tag / SHA) to deploy to production"
        required: true
        default: main
      release_type:
        description: "minor = normal release · major = breaking change"
        required: true
        type: choice
        options:
          - minor
          - major
        default: minor
      rollback:
        description: "Roll back instead of releasing: empty = release; or minor / major / a version like 1.3.0"
        required: false
        default: ""
      confirm:
        description: "Type production to confirm a LIVE production deploy"
        required: true
        default: ""

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write          # required: push the vMAJOR.MINOR.0 release tag
    env:
      DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
      DEPLOY_USER: ${{ vars.DEPLOY_USER }}
      DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
      DEPLOY_ENTRY: ${{ vars.DEPLOY_ENTRY }}
      DEPLOY_PM2_PROCESS: ${{ vars.DEPLOY_PM2_PROCESS || 'app' }}
      BASE_URL: ${{ vars.BASE_URL }}
      STAMP_PATH: ${{ vars.STAMP_PATH || 'src/app/build-stamp.json' }}
    steps:
      - name: Confirmation gate
        if: ${{ github.event.inputs.confirm != 'production' }}
        run: |
          echo "::error::Refusing to deploy: type 'production' in the confirm input." >&2
          exit 1

      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref }}
          fetch-depth: 0         # full history + tags for version derivation

      - name: Resolve rollback target (only when rolling back)
        if: ${{ github.event.inputs.rollback != '' }}
        shell: bash
        env:
          ROLLBACK: ${{ github.event.inputs.rollback }}
        run: |
          set -euo pipefail
          current="$(curl -fsS "$BASE_URL/version" | jq -r '.version')"
          if [ -z "$current" ] || [ "$current" = "null" ] || [ "$current" = "0.0-local" ]; then
            echo "::error::Cannot determine the live production version to roll back from. Deploy to production once first." >&2
            exit 1
          fi
          target="$(node tools/versioning/lib/ci.js rollback "$current" "$ROLLBACK")"
          echo "Rolling back: $current -> $(echo "$target" | jq -r .version)"
          git checkout --quiet "$(echo "$target" | jq -r .tag)"

      - name: Resolve release, tag it, and stamp the certificate
        id: ver
        shell: bash
        env:
          RELEASE_TYPE: ${{ github.event.inputs.release_type }}
        run: |
          set -euo pipefail
          info="$(node tools/versioning/lib/ci.js resolve-release "${RELEASE_TYPE:-minor}")"
          version="$(echo "$info" | jq -r .version)"
          tag="$(echo "$info" | jq -r .tag)"
          if [ "$(echo "$info" | jq -r .createTag)" = "true" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -a "$tag" -m "Release $version"
            git push origin "$tag"
          fi
          node tools/versioning/lib/ci.js stamp "$STAMP_PATH" --channel=production --version="$version"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Configure SSH
        shell: bash
        run: |
          set -euo pipefail
          test -n "${{ secrets.DEPLOY_SSH_KEY }}"
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Sync app files
        shell: bash
        run: |
          set -euo pipefail
          rsync -az --delete \
            --exclude='.git/' --exclude='.env' --exclude='node_modules/' \
            --exclude='data/' --exclude='backups/' \
            -e "ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes" \
            ./ "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/"

      - name: Install production deps and (re)start
        shell: bash
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes "$DEPLOY_USER@$DEPLOY_HOST" \
            "set -e; cd '$DEPLOY_PATH'; npm ci --omit=dev; pm2 delete '$DEPLOY_PM2_PROCESS' >/dev/null 2>&1 || true; pm2 start '$DEPLOY_ENTRY' --name '$DEPLOY_PM2_PROCESS' --update-env; pm2 save"

      - name: Verify production /version reports the deployed build
        shell: bash
        run: |
          set -euo pipefail
          want='${{ steps.ver.outputs.version }}'
          for attempt in $(seq 1 20); do
            got="$(curl -fsS "$BASE_URL/version" | jq -r '.version' 2>/dev/null || true)"
            if [ "$got" = "$want" ]; then echo "Verified production: v$got"; exit 0; fi
            echo "waiting for production /version to report v$want (got v${got:-none})… ($attempt)"
            sleep 3
          done
          echo "::error::production /version did not report v$want" >&2
          exit 1
