name: Staging deploy (auto)

# Staging is always on: every push to main auto-deploys to staging and stamps the running PATCH
# version. No release tags are cut here — tags are cut only by a production deploy. A manual run
# (workflow_dispatch) with a `rollback` input re-deploys an earlier release to staging; the next
# push restores latest main. Deploy is rsync-over-SSH to a Node host running pm2; everything is
# driven by GitHub Environment config.
#
# Configure the `staging` environment (Settings → Environments → staging):
#   Secrets:    DEPLOY_SSH_KEY                  private key for DEPLOY_USER@DEPLOY_HOST
#   Variables:  DEPLOY_HOST                     host/IP of the staging server
#               DEPLOY_USER                     SSH user (e.g. ec2-user)
#               DEPLOY_PATH                     app directory on the server
#               DEPLOY_ENTRY                    node entrypoint (e.g. src/app/server.js)
#               BASE_URL                        staging URL that serves GET /version
#               DEPLOY_PM2_PROCESS  (optional)  pm2 process name        [default: app]
#               STAMP_PATH          (optional)  certificate path        [default: src/app/build-stamp.json]

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      rollback:
        description: "Roll staging back to a version: empty = redeploy latest main; or minor / major / a version like 1.3.0"
        required: false
        default: ""

concurrency:
  group: staging
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging
    env:
      DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
      DEPLOY_USER: ${{ vars.DEPLOY_USER }}
      DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
      DEPLOY_ENTRY: ${{ vars.DEPLOY_ENTRY }}
      DEPLOY_PM2_PROCESS: ${{ vars.DEPLOY_PM2_PROCESS || 'app' }}
      BASE_URL: ${{ vars.BASE_URL }}
      STAMP_PATH: ${{ vars.STAMP_PATH || 'src/app/build-stamp.json' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0         # full history + tags so the PATCH version is correct

      - name: Resolve rollback target (manual rollback only; the next push restores latest)
        if: ${{ github.event.inputs.rollback != '' }}
        shell: bash
        env:
          ROLLBACK: ${{ github.event.inputs.rollback }}
        run: |
          set -euo pipefail
          current="$(curl -fsS "$BASE_URL/version" | jq -r '.version')"
          if [ -z "$current" ] || [ "$current" = "null" ] || [ "$current" = "0.0-local" ]; then
            echo "::error::Cannot determine the live staging version to roll back from. Push to staging once first." >&2
            exit 1
          fi
          target="$(node tools/versioning/lib/ci.js rollback "$current" "$ROLLBACK")"
          echo "Rolling staging back: $current -> $(echo "$target" | jq -r .version)"
          git checkout --quiet "$(echo "$target" | jq -r .tag)"

      - name: Stamp the staging certificate (version at HEAD)
        id: ver
        shell: bash
        run: |
          set -euo pipefail
          node tools/versioning/lib/ci.js stamp "$STAMP_PATH" --channel=staging
          version="$(jq -r .version "$STAMP_PATH")"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Staging version: $version"

      - name: Configure SSH
        shell: bash
        run: |
          set -euo pipefail
          test -n "${{ secrets.DEPLOY_SSH_KEY }}"
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Sync app files
        shell: bash
        run: |
          set -euo pipefail
          rsync -az --delete \
            --exclude='.git/' --exclude='.env' --exclude='node_modules/' \
            --exclude='data/' --exclude='backups/' \
            -e "ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes" \
            ./ "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/"

      - name: Install production deps and (re)start
        shell: bash
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes "$DEPLOY_USER@$DEPLOY_HOST" \
            "set -e; cd '$DEPLOY_PATH'; npm ci --omit=dev; pm2 delete '$DEPLOY_PM2_PROCESS' >/dev/null 2>&1 || true; pm2 start '$DEPLOY_ENTRY' --name '$DEPLOY_PM2_PROCESS' --update-env; pm2 save"

      - name: Verify staging /version
        shell: bash
        run: |
          set -euo pipefail
          want='${{ steps.ver.outputs.version }}'
          for attempt in $(seq 1 20); do
            got="$(curl -fsS "$BASE_URL/version" | jq -r '.version' 2>/dev/null || true)"
            if [ "$got" = "$want" ]; then echo "Verified staging: v$got"; exit 0; fi
            echo "waiting for staging /version to report v$want (got v${got:-none})… ($attempt)"
            sleep 3
          done
          echo "::error::staging /version did not report v$want" >&2
          exit 1
